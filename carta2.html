<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros Momentos</title>
    <style>
        /* Fondo principal de la paleta Nord */
        body {
            background-color: #2e3440; 
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .box {
            background: #3b4252; /* Un gris un poco más claro para la caja */
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #4c566a;
            max-width: 400px;
            width: 100%;
            margin-bottom: 25px; /* Espacio entre las cajas */
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Forzamos a que imagen y video midan lo mismo */
        .media-content {
            width: 100%;
            height: 450px; /* Altura fija para que coincidan */
            object-fit: cover; /* Recorta para llenar el espacio sin deformar */
            border-radius: 8px;
            border: 2px solid #88c0d0;
        }

        p { 
            color: #d8dee9; 
            margin-top: 15px; 
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.95em;
        }

        .back { 
            color: #88c0d0; 
            text-decoration: none; 
            display: inline-block; 
            margin-top: 15px; 
            font-family: sans-serif;
            font-weight: bold;
        }
        
        .back:hover {
            color: #eceff4;
        }
    </style>
</head>
<body>

    <div class="box">
        <img src="foto2.jpeg" alt="Foto" class="media-content">
        <p>Eres quien me cuida despues de mis locuras.</p>
    </div>

    <div class="box">
        <video class="media-content" controls autoplay muted loop>
            <source src="video.mp4" type="video/mp4">
            Tu navegador no soporta videos.
        </video>
        <p>Video qlio lo amo.</p>
        <a href="index.html" class="back">← Volver</a>
    </div>

</body>
</html>
