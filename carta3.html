<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuerdo</title>
    <style>
        body { background-color: #3b4252; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #2e3440; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #4c566a; }
        img { max-width: 100%; max-height: 70vh; border-radius: 4px; border: 2px solid #88c0d0; }
        p { color: #d8dee9; margin-top: 15px; }
        .back { color: #88c0d0; text-decoration: none; display: block; margin-top: 15px; }
    </style>
</head>
<script>
    function crearGirasol() {
        const girasol = document.createElement('div');
        girasol.innerHTML = '🌻';
        girasol.style.position = 'fixed';
        girasol.style.top = '-50px';
        girasol.style.left = Math.random() * 100 + 'vw';
        girasol.style.fontSize = (Math.random() * 20 + 15) + 'px';
        girasol.style.zIndex = '9999';
        girasol.style.pointerEvents = 'none';
        girasol.style.transition = 'transform 15s linear, top 15s linear'; 
        document.body.appendChild(girasol);
        setTimeout(() => {
            girasol.style.top = '110vh';
            girasol.style.transform = `translateX(${Math.random() * 200 - 100}px) rotate(${Math.random() * 360}deg)`;
        }, 100);
        setTimeout(() => {
            girasol.remove();
        }, 15000);
    }
    setInterval(crearGirasol, 2000);
    for(let i=0; i<5; i++) { setTimeout(crearGirasol, i * 500); }
</script>
<body>
    <div class="box">
        <img src="foto3.jpeg" alt="Foto">
        <p>Cuando nos sacamos la cresta.</p>
        <a href="index.html" class="back">← Volver</a>
    </div>
</body>
</html>
